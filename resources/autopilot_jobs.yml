# Flywheel jobs — serverless only (Free Edition), ≤5 concurrent tasks account-wide.
# The flywheel runs 4 tasks strictly sequentially and ds_persona runs 1, so a full
# concurrent burst of both jobs is 2 tasks — well under the limit.
#
# Parameter wiring: every notebook declares widgets with sensible defaults, so
# base_parameters below only pin the knobs an operator tunes per environment.
# space_id is intentionally blank in dev — notebooks 10/30/40 no-op gracefully
# until a Genie space id is supplied (fill it in here, or override at run time:
#   databricks bundle run autopilot_flywheel -t dev --notebook-params space_id=<id>).

resources:
  jobs:
    autopilot_flywheel:
      name: "[autopilot] telemetry → drift → heal → eval"
      max_concurrent_runs: 1
      tasks:
        - task_key: ingest_telemetry
          notebook_task:
            notebook_path: ../notebooks/10_ingest_telemetry.py
            base_parameters:
              domain_schema: workspace.retail
              space_id: ""            # fill in (or pass at run time) to activate harvesting
        - task_key: detect_drift
          depends_on: [{ task_key: ingest_telemetry }]
          notebook_task:
            notebook_path: ../notebooks/20_detect_drift.py
            base_parameters:
              domain_schema: workspace.retail
              min_distinct_users: "2"
        - task_key: apply_healings
          depends_on: [{ task_key: detect_drift }]
          notebook_task:
            notebook_path: ../notebooks/30_apply_healings.py
            base_parameters:
              domain_schema: workspace.retail
              space_id: ""            # needed for Genie space synonym patches
              auto_approve_confidence: "0.75"
              dry_run: "true"         # flip to "false" once the HITL queue looks sane
        - task_key: run_benchmarks
          depends_on: [{ task_key: apply_healings }]
          notebook_task:
            notebook_path: ../notebooks/40_run_benchmarks.py
            base_parameters:
              domain_schema: workspace.retail
              space_id: ""            # needed to launch benchmark eval runs
              phase: post_healing     # this task always measures the healed state
      # Manual trigger during development; schedule (e.g. hourly) added in Week 3.

    ds_persona:
      name: "[autopilot] DS persona — KPIs, forecast, propensity model"
      max_concurrent_runs: 1
      tasks:
        - task_key: ds_kpis_and_models
          notebook_task:
            notebook_path: ../notebooks/50_ds_kpis_and_models.py
            base_parameters:
              domain_schema: workspace.retail

    nightly_sessions:
      name: "[autopilot] nightly persona sessions → telemetry corpus"
      max_concurrent_runs: 1
      schedule:
        quartz_cron_expression: "0 0 2 * * ?"   # 02:00 nightly
        timezone_id: "America/Denver"
        pause_status: UNPAUSED
      tasks:
        - task_key: run_sessions
          notebook_task:
            notebook_path: ../notebooks/70_run_sessions.py
            base_parameters:
              space_id: 01f17b5a51411bc382cd3cd224d11daf
              domain_schema: workspace.retail
              sessions: "10"
              max_questions: "60"
        - task_key: ingest_telemetry
          depends_on: [{ task_key: run_sessions }]
          notebook_task:
            notebook_path: ../notebooks/10_ingest_telemetry.py
            base_parameters:
              domain_schema: workspace.retail
              space_id: 01f17b5a51411bc382cd3cd224d11daf

    router_training:
      name: "[autopilot] semantic router — train, validate, register"
      max_concurrent_runs: 1
      tasks:
        - task_key: train_router
          notebook_task:
            notebook_path: ../notebooks/60_semantic_router.py
            base_parameters:
              domain_schema: workspace.retail
              min_corpus_rows: "30"

    router_arm:
      name: "[autopilot] experimental arm — router+Genie vs Genie alone"
      max_concurrent_runs: 1
      tasks:
        - task_key: router_arm
          notebook_task:
            notebook_path: ../notebooks/61_router_arm.py
            base_parameters:
              domain_schema: workspace.retail
              space_id: 01f17b5a51411bc382cd3cd224d11daf

    daily_ops:
      name: "[autopilot] daily ops — steward KPI report"
      max_concurrent_runs: 1
      schedule:
        quartz_cron_expression: "0 30 3 * * ?"   # 03:30 daily, after nightly sessions
        timezone_id: "America/Denver"
        pause_status: UNPAUSED
      tasks:
        - task_key: escalate_and_apply
          notebook_task:
            notebook_path: ../notebooks/85_escalate_and_apply.py
            base_parameters:
              domain_schema: workspace.retail
        - task_key: steward_report
          depends_on: [{ task_key: escalate_and_apply }]
          notebook_task:
            notebook_path: ../notebooks/90_daily_report.py
            base_parameters:
              domain_schema: workspace.retail

    # Manual trigger only (no schedule): the steward runs this from the Jobs UI with
    # parameter overrides, e.g. action=approve ids=3,7 decided_by=<email>.
    steward_console:
      name: "[autopilot] steward console — HITL list/approve/reject"
      max_concurrent_runs: 1
      tasks:
        - task_key: steward_console
          notebook_task:
            notebook_path: ../notebooks/80_steward_console.py
            base_parameters:
              action: list
              ids: ""
              decided_by: steward
