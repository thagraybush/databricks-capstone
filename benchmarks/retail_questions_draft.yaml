- q: What share of purchasing visitors bought in more than one session?
  trap: true
  certified: true
  answer_sql: |-
    SELECT AVG(CASE WHEN purchase_sessions > 1 THEN 1.0 ELSE 0.0 END) AS repeat_visitor_rate
    FROM (
      SELECT visitor_id, COUNT(*) AS purchase_sessions
      FROM workspace.retail.gold_sessions
      WHERE n_purchases > 0 AND NOT is_bot
      GROUP BY visitor_id
    )
  note: 'Steward-added 2026-07-09 (from certification feedback): ''repeat visitor rate'' = web-attributed
    repeat buying via cookie-level visitor_id, no account/login required. Counts purchasing non-bot visitors
    with purchases in >1 session, 0-1 fraction. Complements the transactional repeat rate; not blendable
    with it absent visitor-to-customer identity resolution.'
