    SELECT AVG(CASE WHEN frequency > 1 THEN 1.0 ELSE 0.0 END) AS repeat_rate
    FROM workspace.retail.gold_customer_rfm
  note: 'Modes 3 + 5 (definition + unit). Certified (steward-reviewed 2026-07-09): repeat rate = share
    of IDENTIFIABLE customers with frequency > 1, as a 0-1 fraction. Anonymous transactions (22.77% of
